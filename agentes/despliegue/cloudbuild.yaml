steps:
  # Paso 1: Construir imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-imagen'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/snow-alert-agentes:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/snow-alert-agentes:latest'
      - '-f'
      - 'agentes/despliegue/Dockerfile'
      - '.'

  # Paso 2: Push de la imagen al registro
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-imagen'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/snow-alert-agentes'

  # Paso 3: Crear o actualizar el Cloud Run Job con la nueva imagen
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'crear-o-actualizar-job'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run jobs describe orquestador-avalanchas \
          --region=us-central1 --project=$PROJECT_ID > /dev/null 2>&1 \
        && gcloud run jobs update orquestador-avalanchas \
            --image=gcr.io/$PROJECT_ID/snow-alert-agentes:$COMMIT_SHA \
            --region=us-central1 --project=$PROJECT_ID \
        || gcloud run jobs create orquestador-avalanchas \
            --image=gcr.io/$PROJECT_ID/snow-alert-agentes:$COMMIT_SHA \
            --region=us-central1 --project=$PROJECT_ID \
            --memory=4Gi --cpu=2 \
            --task-timeout=3600 \
            --max-retries=1 \
            --service-account=funciones-clima-sa@climas-chileno.iam.gserviceaccount.com \
            --set-env-vars=ID_PROYECTO=climas-chileno,DATASET_ID=clima,REGION=us-central1

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/snow-alert-agentes:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/snow-alert-agentes:latest'
